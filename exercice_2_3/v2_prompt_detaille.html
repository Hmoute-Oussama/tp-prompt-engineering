<!--
Exercice 2.3 - Version 2 : Prompt Détaillé
Prompt utilisé : "Crée une mini-application Web en HTML/CSS/JS qui simule une calculatrice
simple. La calculatrice doit :
- Avoir un affichage (écran) pour montrer les nombres et les résultats.
- Inclure les boutons 0-9, les opérateurs +, -, *, /, un bouton '=' pour calculer,
  un bouton 'C' pour effacer.
- Gérer les erreurs comme la division par zéro (afficher 'Erreur').
- Avoir un design moderne avec des couleurs sombres, des coins arrondis,
  des ombres, et des effets hover sur les boutons.
- Utiliser un layout en grille CSS pour disposer les boutons proprement.
- Ne pas utiliser eval() pour des raisons de sécurité."

Résultat généré par l'IA :
-->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice Moderne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ─── Reset & Base ─────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        /* ─── Calculatrice ─────────────────────────────────── */
        .calculator {
            width: 340px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ─── Écran d'affichage ────────────────────────────── */
        .display {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .display .expression {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.9rem;
            font-weight: 300;
            min-height: 1.2em;
            word-break: break-all;
        }

        .display .current {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 600;
            word-break: break-all;
            line-height: 1.2;
        }

        .display .current.error {
            color: #ff6b6b;
            font-size: 1.4rem;
        }

        /* ─── Grille de boutons ────────────────────────────── */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            height: 62px;
            border: none;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        /* Boutons numériques */
        .btn.number {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }
        .btn.number:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: translateY(-2px);
        }
        .btn.number:active {
            transform: translateY(0);
            background: rgba(255, 255, 255, 0.22);
        }

        /* Boutons opérateurs */
        .btn.operator {
            background: rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            font-weight: 600;
        }
        .btn.operator:hover {
            background: rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }
        .btn.operator:active {
            transform: translateY(0);
        }
        .btn.operator.active {
            background: rgba(99, 102, 241, 0.7);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        /* Bouton Effacer */
        .btn.clear {
            background: rgba(239, 68, 68, 0.25);
            color: #fca5a5;
            font-weight: 600;
        }
        .btn.clear:hover {
            background: rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
        }

        /* Bouton Égal */
        .btn.equal {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #ffffff;
            font-weight: 600;
            grid-column: span 2;
        }
        .btn.equal:hover {
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
        }

        /* Bouton zéro */
        .btn.zero {
            grid-column: span 2;
        }

        /* ─── Animation de pression ────────────────────────── */
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.2), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn:active::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- Écran d'affichage -->
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="current" id="current">0</div>
        </div>

        <!-- Grille de boutons -->
        <div class="buttons">
            <button class="btn clear" id="btn-clear" onclick="clearAll()">C</button>
            <button class="btn clear" id="btn-backspace" onclick="backspace()">⌫</button>
            <button class="btn operator" id="btn-mod" onclick="setOperator('%')">%</button>
            <button class="btn operator" id="btn-divide" onclick="setOperator('÷')">÷</button>

            <button class="btn number" id="btn-7" onclick="appendNumber('7')">7</button>
            <button class="btn number" id="btn-8" onclick="appendNumber('8')">8</button>
            <button class="btn number" id="btn-9" onclick="appendNumber('9')">9</button>
            <button class="btn operator" id="btn-multiply" onclick="setOperator('×')">×</button>

            <button class="btn number" id="btn-4" onclick="appendNumber('4')">4</button>
            <button class="btn number" id="btn-5" onclick="appendNumber('5')">5</button>
            <button class="btn number" id="btn-6" onclick="appendNumber('6')">6</button>
            <button class="btn operator" id="btn-subtract" onclick="setOperator('−')">−</button>

            <button class="btn number" id="btn-1" onclick="appendNumber('1')">1</button>
            <button class="btn number" id="btn-2" onclick="appendNumber('2')">2</button>
            <button class="btn number" id="btn-3" onclick="appendNumber('3')">3</button>
            <button class="btn operator" id="btn-add" onclick="setOperator('+')">+</button>

            <button class="btn number zero" id="btn-0" onclick="appendNumber('0')">0</button>
            <button class="btn number" id="btn-dot" onclick="appendDot()">.</button>
            <button class="btn equal" id="btn-equal" onclick="computeResult()">=</button>
        </div>
    </div>

    <script>
        // ─── État de la calculatrice ─────────────────────────
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetScreen = false;

        const currentDisplay = document.getElementById('current');
        const expressionDisplay = document.getElementById('expression');

        // ─── Fonctions d'affichage ──────────────────────────
        function updateDisplay() {
            currentDisplay.textContent = currentInput;
            currentDisplay.classList.remove('error');
        }

        function showError(message) {
            currentDisplay.textContent = message;
            currentDisplay.classList.add('error');
        }

        // ─── Saisie des nombres ─────────────────────────────
        function appendNumber(num) {
            if (currentInput === '0' || shouldResetScreen) {
                currentInput = num;
                shouldResetScreen = false;
            } else {
                if (currentInput.length >= 15) return; // Limite de longueur
                currentInput += num;
            }
            updateDisplay();
        }

        // ─── Saisie du point décimal ────────────────────────
        function appendDot() {
            if (shouldResetScreen) {
                currentInput = '0';
                shouldResetScreen = false;
            }
            if (!currentInput.includes('.')) {
                currentInput += '.';
            }
            updateDisplay();
        }

        // ─── Sélection de l'opérateur ───────────────────────
        function setOperator(op) {
            if (operator && !shouldResetScreen) {
                computeResult();
            }
            previousInput = currentInput;
            operator = op;
            shouldResetScreen = true;
            expressionDisplay.textContent = `${previousInput} ${operator}`;

            // Highlight du bouton actif
            document.querySelectorAll('.btn.operator').forEach(btn =>
                btn.classList.remove('active')
            );
            event.target.classList.add('active');
        }

        // ─── Calcul du résultat (SANS eval) ─────────────────
        function computeResult() {
            if (!operator || !previousInput) return;

            const a = parseFloat(previousInput);
            const b = parseFloat(currentInput);
            let result;

            switch (operator) {
                case '+':
                    result = a + b;
                    break;
                case '−':
                    result = a - b;
                    break;
                case '×':
                    result = a * b;
                    break;
                case '÷':
                    if (b === 0) {
                        expressionDisplay.textContent = `${previousInput} ${operator} ${currentInput} =`;
                        showError('Erreur : division par zéro');
                        operator = null;
                        previousInput = '';
                        shouldResetScreen = true;
                        return;
                    }
                    result = a / b;
                    break;
                case '%':
                    if (b === 0) {
                        expressionDisplay.textContent = `${previousInput} ${operator} ${currentInput} =`;
                        showError('Erreur : division par zéro');
                        operator = null;
                        previousInput = '';
                        shouldResetScreen = true;
                        return;
                    }
                    result = a % b;
                    break;
                default:
                    return;
            }

            // Arrondir pour éviter les erreurs de flottants
            result = Math.round(result * 1e10) / 1e10;

            expressionDisplay.textContent = `${previousInput} ${operator} ${currentInput} =`;
            currentInput = result.toString();
            operator = null;
            previousInput = '';
            shouldResetScreen = true;

            // Retirer le highlight
            document.querySelectorAll('.btn.operator').forEach(btn =>
                btn.classList.remove('active')
            );

            updateDisplay();
        }

        // ─── Effacer tout ───────────────────────────────────
        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            shouldResetScreen = false;
            expressionDisplay.textContent = '';
            updateDisplay();
        }

        // ─── Effacer dernier caractère ──────────────────────
        function backspace() {
            if (shouldResetScreen) return;
            currentInput = currentInput.slice(0, -1) || '0';
            updateDisplay();
        }

        // ─── Support clavier ────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            else if (e.key === '.') appendDot();
            else if (e.key === '+') setOperator('+');
            else if (e.key === '-') setOperator('−');
            else if (e.key === '*') setOperator('×');
            else if (e.key === '/') { e.preventDefault(); setOperator('÷'); }
            else if (e.key === '%') setOperator('%');
            else if (e.key === 'Enter' || e.key === '=') computeResult();
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>
